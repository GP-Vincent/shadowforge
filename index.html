/* 隨機事件生成 - 在生態圈過渡區生成 */
function ensureEventsGenerated(){
  // 在每 2500 距離生成一個隨機事件區
  const segSize = 2500;
  const seg = Math.floor(game.player.worldX / segSize);
  for(let s = seg; s<=seg+1; s++){
    const key = 'evt_'+s;
    if(game.generatedEvents.has(key)) continue;
    game.generatedEvents.add(key);
    // 起點之村區域不生成
    const baseX = s * segSize;
    if(baseX < 1500) continue;
    // 不在村莊區域生成
    const inVillage = VILLAGES.some(v=>Math.abs(v.worldX-baseX-1250)<800);
    if(inVillage) continue;
    // 30% 機率生成事件
    if(Math.random()<0.6){
      const eventTypes = ['shrine','treasure','caravan'];
      const evtType = choice(eventTypes);
      const evtX = baseX + 1200 + Math.random()*600;
      game.events.push({
        type:evtType,
        worldX:evtX,
        used:false,
        id:'evt_'+s+'_'+evtType,
      });
    }
  }
}

/* 平台生成 - 在玩家附近的「區段」生成浮空平台 */
function ensurePlatformsGenerated(){
  const segSize = 1600;
  const playerSeg = Math.floor(game.player.worldX / segSize);
  for(let s = playerSeg-1; s<=playerSeg+2; s++){
    if(game.generatedPlatforms.has(s)) continue;
    game.generatedPlatforms.add(s);
    generatePlatformsForSegment(s, segSize);
  }
}

function generatePlatformsForSegment(segIdx, segSize){
  // 用 segIdx 做確定性隨機種子
  let seed = Math.abs(Math.sin(segIdx*73.31)*10000);
  const rng = ()=>{
    seed = (seed*9301+49297)%233280;
    return seed/233280;
  };
  const startX = segIdx * segSize;
  const endX = startX + segSize;

  // 村莊區不生成浮空平台 (保留商店動線)
  for(const v of VILLAGES){
    if(v.worldX > startX-400 && v.worldX < endX+800) return;
  }
  if(startX < 600) return; // 起點區域不生

  const groundY = getGroundY();
  // 在這段 worldX 範圍內，產生 3-6 個平台
  const count = 3 + Math.floor(rng()*4);
  for(let i=0;i<count;i++){
    const px = startX + 200 + rng()*(segSize-400);
    // 高度 (相對地面往上)
    const tier = 1 + Math.floor(rng()*3); // 1/2/3 層
    const py = groundY - tier*80 - rng()*20;
    const pw = 80 + rng()*140;
    game.platforms.push({
      worldX: px, y: py, w: pw, h: 12,
      dropThrough: true,
      tier,
    });
  }
  // 加入幾個短梯子型小平台
  for(let i=0;i<2;i++){
    const px = startX + rng()*segSize;
    const py = groundY - 60 - rng()*40;
    game.platforms.push({
      worldX: px, y: py, w: 60+rng()*40, h: 10,
      dropThrough: true, tier:1,
    });
  }
}

function spawnMonsterNearPlayer(){
  const biome = getBiome(game.player.worldX);
  if(!biome.monsters.length) return;
  for(const v of VILLAGES){
    if(Math.abs(game.player.worldX - v.worldX) < 600) return;
  }
  // Boss 區域 800 內不刷小怪
  for(const b of BOSSES){
    if(Math.abs(game.player.worldX - b.worldX) < 700 && !game.player.bossesKilled[b.id]) return;
  }
  const proto = choice(biome.monsters);
  const lv = getMonsterLevel(game.player.worldX);
  const side = Math.random()<0.5 ? -1 : 1;
  const dist = rand(canvas.clientWidth*0.4, canvas.clientWidth*0.6);
  const worldX = game.player.worldX + side*dist;
  const hpMul = 1 + lv*0.12;
  const dmgMul = 1 + lv*0.10;
  // 5% 機率變精英怪
  const isElite = Math.random() < 0.05;
  const eliteHp = isElite ? 3 : 1;
  const eliteDmg = isElite ? 1.5 : 1;
  const eliteSize = isElite ? 1.3 : 1;
  // 30% 機率讓怪物出現在浮空平台上
  let y = getGroundY() - proto.size*0.3;
  let onPlat = null;
  if(Math.random() < 0.3){
    const nearbyPlats = game.platforms.filter(pl=>Math.abs(pl.worldX - worldX) < 200);
    if(nearbyPlats.length){
      const pl = choice(nearbyPlats);
      y = pl.y - proto.size*0.3;
      onPlat = pl;
    }
  }
  const m = {
    name: isElite ? '【精英】'+proto.name : proto.name,
    art:proto.art, size:proto.size*eliteSize,
    hpMax:Math.floor(proto.hp*hpMul*eliteHp), hp:0,
    dmg:Math.floor(proto.dmg*dmgMul*eliteDmg),
    xp:Math.floor(proto.xp*(1+lv*0.05) * (isElite?3:1)),
    gold:Math.floor(proto.gold*(1+lv*0.05) * (isElite?4:1)),
    speed:proto.speed,
    lv,
    worldX, y,
    vy:0, vx:0,
    onPlatform: onPlat,
    onGround: true,
    facing:-side, attackT:0, attackCD:rand(1.2,2.0),
    hitT:0, dead:false, deathT:0,
    slowT:0, knockbackT:0,
    isElite,
    eliteDropBonus: isElite ? 5 : 1,
  };
  m.hp = m.hpMax;
  game.monsters.push(m);
}

function maintainMonsters(dt){
  game.lastSpawn -= dt;
  for(let i=game.monsters.length-1;i>=0;i--){
    const m = game.monsters[i];
    if(m.dead){
      m.deathT -= dt;
      if(m.deathT<=0){
        // Boss 死亡時，從已生成記錄移除以允許重生（但 bossesKilled 仍會阻止重複生成）
        if(m.isBoss) game.generatedBosses.delete(m.bossDef.id);
        game.monsters.splice(i,1);
      }
    }
    else if(!m.isBoss && Math.abs(m.worldX - game.player.worldX) > canvas.clientWidth*1.2){
      game.monsters.splice(i,1);
    }
    else if(m.isBoss && Math.abs(m.worldX - game.player.worldX) > canvas.clientWidth*2.5){
      // Boss 離太遠 → 移除並讓它可以重新生成
      game.generatedBosses.delete(m.bossDef.id);
      game.monsters.splice(i,1);
    }
  }
  const alive = game.monsters.filter(m=>!m.dead && !m.isBoss).length;
  if(alive < 4 && game.lastSpawn<=0){
    spawnMonsterNearPlayer();
    game.lastSpawn = rand(0.8, 1.8);
  }
}

function updateMonsters(dt){
  const p = game.player;
  game.monsters.forEach(m=>{
    if(m.dead) return;
    if(m.hitT>0) m.hitT -= dt;
    if(m.slowT>0) m.slowT -= dt;
    if(m.knockbackT>0){
      m.knockbackT -= dt;
      m.worldX += m.vx*dt;
      m.vx *= 0.9;
    }
    // 重力
    m.vy += GRAVITY*dt;
    m.y += m.vy*dt;
    // 地面碰撞 (主地面 + 平台)
    let landed = false;
    const groundY = getGroundY();
    if(m.y >= groundY - m.size*0.3){
      m.y = groundY - m.size*0.3;
      m.vy = 0;
      m.onGround = true;
      m.onPlatform = null;
      landed = true;
    } else if(m.onPlatform){
      const pl = m.onPlatform;
      // 仍停在它的平台上
      if(m.worldX >= pl.worldX - pl.w/2 && m.worldX <= pl.worldX + pl.w/2){
        if(m.vy >= 0 && m.y >= pl.y - m.size*0.3 && m.y <= pl.y + 20){
          m.y = pl.y - m.size*0.3;
          m.vy = 0;
          m.onGround = true;
          landed = true;
        }
      } else {
        m.onPlatform = null; // 走出平台範圍 = 掉下
      }
    }
    if(!landed) m.onGround = false;

    if(m.knockbackT>0) return;

    const dx = p.worldX - m.worldX;
    const dy = p.y - m.y;
    const dst = Math.abs(dx);
    const yDiff = Math.abs(dy);
    const attackRange = m.size*0.5 + 30;

    const slowMul = m.slowT>0 ? 0.4 : 1;

    // 只在差不多同一層才追擊
    if(yDiff < 80){
      if(dst > attackRange){
        const dir = dx>0?1:-1;
        m.worldX += dir * m.speed * slowMul * dt;
        m.facing = dir;
      } else {
        m.attackT -= dt;
        if(m.attackT<=0){
          m.attackT = m.attackCD;
          if(p.invincible<=0 && p.hp>0){
            const d = getDerived();
            if(Math.random() < d.dodge){
              game.damageTexts.push({worldX:p.worldX,y:p.y-30,text:'閃避',color:'#5a9a4a',size:14,life:0.8,vy:-30});
            } else {
              let dmg = Math.floor(m.dmg*rand(0.85,1.15));
              dmg = Math.max(1, Math.floor(dmg*(1-d.armorReduce)));
              p.hp = Math.max(0,p.hp-dmg);
              game.damageTexts.push({worldX:p.worldX+rand(-10,10),y:p.y-40,text:dmg,color:'#ff4040',size:16,life:0.8,vy:-40});
              game.cameraShake = 5;
              // 反傷
              if(d.thorns>0){
                const reflect = Math.floor(dmg * d.thorns);
                if(reflect>0) dealDamage(m, reflect);
              }
              updateUI();
              if(p.hp<=0) setTimeout(revive,1500);
            }
          }
        }
      }
    } else {
      // 在不同層 - 走向玩家 X 方向，等高度差縮小
      const dir = dx>0?1:-1;
      m.worldX += dir * m.speed * 0.5 * slowMul * dt;
      m.facing = dir;
    }
  });
}

function revive(){
  const p = game.player;
  p.deaths++;
  // 計算金幣損失
  const heldGold = p.gold;
  const lostGold = Math.floor(heldGold * 0.2);
  p.gold = heldGold - lostGold;
  // 裝備重置（卸下並丟回背包，背包滿則丟失）
  let dropped = 0;
  for(const slot of SLOT_ORDER){
    const eq = game.equipment[slot];
    if(eq){
      if(game.inventory.length < game.inventoryMax){
        game.inventory.push(eq);
      } else {
        dropped++;
      }
      game.equipment[slot] = null;
    }
  }
  // 回村
  const startVillage = VILLAGES[0];
  p.worldX = startVillage.worldX + 200;
  p.vy = 0; p.vx = 0;
  p.y = getGroundY();
  // 清空當前小怪 & 暫存事件
  game.monsters = [];
  game.loot = [];
  game.treasureBoxes = [];
  game.projectiles = [];
  game.effects = [];
  game.damageTexts = [];
  game.buffs = {};
  // 恢復 HP/MP
  const d = getDerived();
  p.hp = d.hpMax; p.mp = d.mpMax;
  p.invincible = 2;
  game.cameraShake = 0;

  showDeathScreen({lostGold, dropped, deaths:p.deaths});
}

function showDeathScreen(info){
  const overlay = document.createElement('div');
  overlay.className = 'death-overlay';
  overlay.innerHTML = `
    <div class="death-modal">
      <div class="death-title">YOU DIED</div>
      <div class="death-sub">第 ${info.deaths} 次墜入輪迴</div>
      <div class="death-stats">
        <div>💰 損失金幣：${info.lostGold}</div>
        <div>⚔️ 卸下所有裝備${info.dropped>0?`（${info.dropped} 件因背包滿丟失）`:''}</div>
        <div class="death-good">✅ 保留：技能、神器、銀行存款、屬性點</div>
        <div class="death-hint">提示：把金幣存入銀行可避免損失</div>
      </div>
      <button class="death-btn" id="deathContinue">回到起點之村</button>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('deathContinue').addEventListener('click',()=>{
    overlay.remove();
    logMsg(`於起點之村重生（第${info.deaths}次輪迴）`);
    updateUI();
  });
}

/* ============================================================
   EFFECTS
   ============================================================ */
function spawnEffect(worldX, y, type, opts={}){
  game.effects.push({worldX,y,type,life:opts.life||0.4,maxLife:opts.life||opts.maxLife||0.4,...opts});
}
function updateEffects(dt){
  for(let i=game.effects.length-1;i>=0;i--){
    game.effects[i].life -= dt;
    if(game.effects[i].life<=0) game.effects.splice(i,1);
  }
  for(let i=game.damageTexts.length-1;i>=0;i--){
    const t = game.damageTexts[i];
    t.life -= dt;
    t.y += t.vy*dt;
    t.vy += 80*dt;
    if(t.life<=0) game.damageTexts.splice(i,1);
  }
}
function updateProjectiles(dt){
  for(let i=game.projectiles.length-1;i>=0;i--){
    const pr = game.projectiles[i];
    const prevX = pr.worldX;
    const prevY = pr.y;
    pr.worldX += pr.vx*dt; pr.y += pr.vy*dt;
    pr.life -= dt;
    let removed = false;
    if(pr.friendly){
      for(const m of game.monsters){
        if(m.dead) continue;
        // 用 m 上半身中心 (頭部位置) 當目標，y 是腳底
        const targetY = m.y - m.size*0.4;
        // 容差 - boss/精英大一點
        const hitW = m.size*0.7 + (m.isBoss?20:0);
        const hitH = m.size*0.9 + (m.isBoss?20:0);
        // Swept check: 檢查線段 (prevX,prevY) -> (pr.worldX, pr.y) 是否經過怪物 hitbox
        // 簡化版：取線段中點測試 + 端點測試
        const midX = (prevX + pr.worldX)/2;
        const midY = (prevY + pr.y)/2;
        const hit = (
          (Math.abs(pr.worldX - m.worldX) < hitW && Math.abs(pr.y - targetY) < hitH) ||
          (Math.abs(midX - m.worldX) < hitW && Math.abs(midY - targetY) < hitH) ||
          (Math.abs(prevX - m.worldX) < hitW && Math.abs(prevY - targetY) < hitH)
        );
        if(hit){
          dealDamage(m, pr.dmg);
          if(!pr.piercing){ game.projectiles.splice(i,1); removed=true; break; }
        }
      }
    }
    if(!removed){
      if(Math.abs(pr.worldX - game.player.worldX) > 1200 || pr.life<=0 || pr.y > getGroundY()+50){
        game.projectiles.splice(i,1);
      }
    }
  }
}

/* ============================================================
   PLAYER UPDATE (含重力 + 平台碰撞)
   ============================================================ */
function updatePlayer(dt){
  const p = game.player;
  if(p.hp<=0) return;
  if(game.shopOpen || game.skillPanelOpen) return;
  const d = getDerived();
  p.speed = d.moveSpeed;

  // 衝刺
  if(p.dashT>0){
    p.dashT -= dt;
    p.worldX += p.facing * 700 * dt;
    if(Math.random()<0.5) spawnEffect(p.worldX, p.y-20, 'dash_trail',{life:0.3,maxLife:0.3});
  } else {
    // 水平移動 (鍵盤 + 觸控搖桿)
    let dx = 0;
    if(game.keys['ArrowLeft']||game.keys.a) dx -= 1;
    if(game.keys['ArrowRight']||game.keys.d) dx += 1;
    // 觸控搖桿輸入
    if(touchInput.joystickX !== 0){
      dx = touchInput.joystickX; // 覆寫鍵盤，類比量
    }
    if(dx!==0){
      p.worldX += dx*p.speed*dt;
      p.facing = dx>0 ? 1 : -1;
    }
  }

  // 垂直 (重力 + 跳躍 + 平台)
  p.vy += GRAVITY*dt;
  p.y += p.vy*dt;
  if(p.dropThrough>0) p.dropThrough -= dt;

  // 平台碰撞檢測
  let landed = false;
  const groundY = getGroundY();
  // 主地面
  if(p.y >= groundY){
    p.y = groundY;
    p.vy = 0;
    p.onGround = true;
    p.currentPlatform = null;
    landed = true;
  }
  // 浮空平台 (只在下落時且不在下穿狀態)
  if(!landed && p.vy > 0 && p.dropThrough<=0){
    for(const pl of game.platforms){
      const inX = Math.abs(p.worldX - pl.worldX) < pl.w/2;
      if(!inX) continue;
      // 上一幀在平台之上，這一幀穿過 -> 落定
      const prevY = p.y - p.vy*dt;
      if(prevY <= pl.y && p.y >= pl.y && p.y <= pl.y + 30){
        p.y = pl.y;
        p.vy = 0;
        p.onGround = true;
        p.currentPlatform = pl;
        landed = true;
        break;
      }
    }
  }
  // 如果仍停在當前平台上但已掉出 x 範圍
  if(p.currentPlatform){
    const pl = p.currentPlatform;
    if(Math.abs(p.worldX - pl.worldX) > pl.w/2){
      p.currentPlatform = null;
      p.onGround = false;
    }
  }
  if(!landed && !p.currentPlatform) p.onGround = false;

  // 揮砍時間
  if(p.swingT>0){
    p.swingT -= dt*1000;
    if(p.swingT<=0){ p.swingT=0; p.isSwinging=false; }
  }
  if(p.dashCD>0) p.dashCD -= dt;
  if(p.invincible>0) p.invincible -= dt;

  // CD
  for(let i=0;i<game.cooldowns.length;i++){
    if(game.cooldowns[i]>0) game.cooldowns[i] -= dt;
  }

  // Buff 時間
  Object.keys(p.buffs).forEach(k=>{
    p.buffs[k] -= dt;
    if(p.buffs[k]<=0) delete p.buffs[k];
  });

  // HP/MP regen
  game.regenAccum += dt;
  if(game.regenAccum > 1){
    game.regenAccum = 0;
    if(p.mp<d.mpMax){ p.mp=Math.min(d.mpMax,p.mp+2); updateUI(); }
    if(p.hp<d.hpMax){
      const regen = 1 + Math.floor(d.hpMax*d.regen);
      p.hp=Math.min(d.hpMax,p.hp+regen);
      updateUI();
    }
  }

  pickupLoot();
  ensureVillagesGenerated();
  ensurePlatformsGenerated();
  ensureBossesGenerated();
  ensureEventsGenerated();
  detectNearbyNpc();
  detectNearbyEvent();
  detectNearbyTreasure();

  // 相機跟隨
  const targetCam = p.worldX - canvas.clientWidth*0.5;
  game.cameraX += (targetCam - game.cameraX) * Math.min(1, dt*4);
  // Y 相機只稍微跟隨高度，避免太多晃動
  const targetCamY = Math.min(0, p.y - canvas.clientHeight*0.75);
  game.cameraY += (targetCamY - game.cameraY) * Math.min(1, dt*3);
}

function detectNearbyNpc(){
  const p = game.player;
  let nearby = null;
  for(const npc of game.npcs){
    if(Math.abs(npc.worldX - p.worldX) < 60 && Math.abs(npc.worldX*0 + getGroundY() - p.y) < 30){
      nearby = npc; break;
    }
  }
  game.nearbyNpc = nearby;
  updateInteractHint();
}

function detectNearbyEvent(){
  const p = game.player;
  let nearby = null;
  for(const evt of game.events){
    if(evt.used) continue;
    if(Math.abs(evt.worldX - p.worldX) < 60 && Math.abs(getGroundY() - p.y) < 50){
      nearby = evt; break;
    }
  }
  game.nearbyEvent = nearby;
  updateInteractHint();
}

function detectNearbyTreasure(){
  const p = game.player;
  let nearby = null;
  for(const t of game.treasureBoxes){
    if(Math.abs(t.worldX - p.worldX) < 60 && Math.abs(getGroundY() - p.y) < 50){
      nearby = t; break;
    }
  }
  game.nearbyTreasure = nearby;
  updateInteractHint();
}

function updateInteractHint(){
  const hint = $('interactHint');
  if(game.nearbyTreasure){
    hint.textContent = `[F] 開啟 Boss 寶箱！`;
    hint.style.display = 'block';
  } else if(game.nearbyNpc){
    hint.textContent = `[F] 與 ${NPC_TYPES[game.nearbyNpc.type].name} 交談`;
    hint.style.display = 'block';
  } else if(game.nearbyEvent){
    const t = EVENT_TYPES[game.nearbyEvent.type];
    hint.textContent = `[F] ${t.icon} ${t.name}`;
    hint.style.display = 'block';
  } else {
    hint.style.display = 'none';
  }
}

/* ============================================================
   PET AI
   ============================================================ */
function updatePet(dt){
  const p = game.player;
  if(!p.petId || !PETS[p.petId]) return;
  const pet = PETS[p.petId];
  // 目標：在玩家後上方飄
  const targetX = p.worldX - p.facing*50;
  const targetY = p.y - 50 + Math.sin(performance.now()*0.003)*8;
  // 平滑跟隨
  const dx = targetX - game.petX;
  const dy = targetY - game.petY;
  game.petX += dx * Math.min(1, dt*5);
  game.petY += dy * Math.min(1, dt*5);
  // 攻擊邏輯
  game.petAtkT -= dt;
  if(game.petAtkT <= 0){
    // 找最近的怪物
    let target = null; let bestD = pet.range;
    for(const m of game.monsters){
      if(m.dead) continue;
      const d = Math.hypot(m.worldX - game.petX, m.y - game.petY);
      if(d < bestD){ bestD = d; target = m; }
    }
    if(target){
      // 發射友軍投射物
      const derived = getDerived();
      const dmg = Math.max(1, Math.floor((derived.atk + derived.magic*0.5) * pet.atkMult));
      const tx = target.worldX, ty = target.y - target.size*0.3;
      const dxs = tx - game.petX, dys = ty - game.petY;
      const dist = Math.hypot(dxs, dys);
      const sp = 500;
      game.projectiles.push({
        worldX:game.petX, y:game.petY,
        vx: (dxs/dist)*sp, vy: (dys/dist)*sp,
        dmg, life:1.2, size:5, color:pet.color, friendly:true, fromPet:true,
      });
      game.petAtkT = pet.atkSpeed + 0.1;
      // 吸血傳給玩家
      if(pet.lifesteal){
        const heal = Math.floor(dmg * pet.lifesteal);
        if(heal>0) p.hp = Math.min(derived.hpMax, p.hp + heal);
      }
    } else {
      game.petAtkT = 0.3;
    }
  }
}

/* ============================================================
   LOOT FALL ANIM (含 X 方向初速)
   ============================================================ */
function updateLoot(dt){
  game.loot.forEach(L=>{
    if(!L.grounded){
      L.y += L.vy * dt;
      L.worldX += (L.vx||0) * dt;
      L.vy += GRAVITY * dt;
      L.vx = (L.vx||0)*0.92;
      // 落地判定：主地面 + 平台
      const groundY = getGroundY();
      let landed = false;
      if(L.y >= groundY - 5){
        L.y = groundY - 5;
        L.vy = -L.vy*0.4;
        if(Math.abs(L.vy) < 60) { L.grounded = true; L.vy=0; }
        landed = true;
      }
      if(!landed && L.vy > 0){
        for(const pl of game.platforms){
          if(Math.abs(L.worldX - pl.worldX) > pl.w/2) continue;
          const prevY = L.y - L.vy*dt;
          if(prevY <= pl.y && L.y >= pl.y && L.y <= pl.y + 20){
            L.y = pl.y - 5;
            L.vy = -L.vy*0.4;
            if(Math.abs(L.vy) < 60) { L.grounded = true; L.vy=0; }
            break;
          }
        }
      }
    }
    L.glow += dt*3;
  });
}

/* ============================================================
   RENDER
   ============================================================ */
function drawBackgroundLayers(){
  const w = canvas.clientWidth, h = canvas.clientHeight;
  const biome = getBiome(game.player.worldX);
  let nextBiome = null;
  for(const b of BIOMES){
    if(b.minDist > game.player.worldX){ nextBiome = b; break; }
  }
  let blendT = 0;
  if(nextBiome){
    const dist = nextBiome.minDist - game.player.worldX;
    if(dist < 400){ blendT = 1 - dist/400; }
  }
  const lerpColor = (c1,c2,t)=>{
    const a = parseInt(c1.slice(1),16), b = parseInt(c2.slice(1),16);
    const r1=(a>>16)&255, g1=(a>>8)&255, b1=a&255;
    const r2=(b>>16)&255, g2=(b>>8)&255, b2=b&255;
    const r = Math.round(r1+(r2-r1)*t);
    const g = Math.round(g1+(g2-g1)*t);
    const b3 = Math.round(b1+(b2-b1)*t);
    return `rgb(${r},${g},${b3})`;
  };
  let sky0 = biome.sky[0], sky1 = biome.sky[1];
  let gnd0 = biome.ground[0], gnd1 = biome.ground[1];
  if(nextBiome && blendT>0){
    sky0 = lerpColor(biome.sky[0], nextBiome.sky[0], blendT);
    sky1 = lerpColor(biome.sky[1], nextBiome.sky[1], blendT);
    gnd0 = lerpColor(biome.ground[0], nextBiome.ground[0], blendT);
    gnd1 = lerpColor(biome.ground[1], nextBiome.ground[1], blendT);
  }
  const groundY = getGroundY() - game.cameraY;
  // 天空
  const skyG = ctx.createLinearGradient(0,0,0,Math.max(groundY,10));
  skyG.addColorStop(0, sky1);
  skyG.addColorStop(1, sky0);
  ctx.fillStyle = skyG;
  ctx.fillRect(0,0,w,Math.max(groundY,10));
  // 地面
  const gndG = ctx.createLinearGradient(0,groundY,0,h);
  gndG.addColorStop(0, gnd0);
  gndG.addColorStop(1, gnd1);
  ctx.fillStyle = gndG;
  ctx.fillRect(0,groundY,w,h-groundY);

  drawParallaxLayer(biome, blendT, nextBiome);

  // 地面網格紋理
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  const tile = 80;
  const offsetX = -game.cameraX % tile;
  for(let x=offsetX; x<w; x+=tile){
    ctx.beginPath(); ctx.moveTo(x,groundY); ctx.lineTo(x,h);
    ctx.stroke();
  }
}

function drawParallaxLayer(biome, blendT, nextBiome){
  const w = canvas.clientWidth, h = canvas.clientHeight;
  const groundY = getGroundY() - game.cameraY;

  const layers = [
    { parallax:0.15, color:'rgba(0,0,0,0.4)', height:0.4, freq:0.001, amp:60 },
    { parallax:0.30, color:'rgba(0,0,0,0.55)', height:0.55, freq:0.0015, amp:80 },
    { parallax:0.55, color:'rgba(0,0,0,0.75)', height:0.7, freq:0.002, amp:100 },
  ];
  layers.forEach((L,idx)=>{
    const offset = game.cameraX * L.parallax;
    ctx.fillStyle = L.color;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    const baseY = groundY - groundY*L.height + L.amp;
    for(let x=0;x<=w;x+=20){
      const wx = x + offset;
      const y = baseY - Math.abs(Math.sin(wx*L.freq + idx*1.7)*L.amp) - Math.abs(Math.sin(wx*L.freq*2.3)*L.amp*0.3);
      ctx.lineTo(x, y);
    }
    ctx.lineTo(w, groundY);
    ctx.closePath();
    ctx.fill();
  });

  drawBiomeDecor(biome);
}

function drawBiomeDecor(biome){
  const w = canvas.clientWidth;
  const groundY = getGroundY();
  const startX = Math.floor((game.cameraX-100)/100) * 100;
  const endX = startX + w + 200;
  for(let wx = startX; wx<endX; wx+=80){
    const seed = Math.abs(Math.sin(wx*0.13)*10000) % 1;
    if(seed < 0.5) continue;
    const sx = worldToScreenX(wx);
    const gy = worldToScreenY(groundY);
    const b = getBiome(wx);
    const v = (Math.abs(Math.sin(wx*0.27))*10000) % 1;
    if(b.deco==='forest'){
      drawTree(sx, gy, 30+v*20, '#1a2a18');
    } else if(b.deco==='graveyard'){
      drawTombstone(sx, gy, 18+v*10);
    } else if(b.deco==='lava'){
      drawLavaCrack(sx, gy, 20+v*15);
    } else if(b.deco==='ice'){
      drawIcePeak(sx, gy, 25+v*20);
    } else if(b.deco==='void'){
      drawVoidCrystal(sx, gy, 22+v*18);
    } else if(b.deco==='cosmic'){
      drawCosmicPillar(sx, gy, 30+v*25);
    }
  }
  game.buildings.forEach(bd=>{
    const sx = worldToScreenX(bd.worldX);
    const gy = worldToScreenY(groundY);
    if(sx<-200||sx>w+200) return;
    drawBuilding(sx, gy, bd);
  });
}

function drawTree(sx, gy, h, color){
  ctx.fillStyle = '#2a1a10';
  ctx.fillRect(sx-3, gy-h*0.5, 6, h*0.5);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(sx, gy-h);
  ctx.lineTo(sx-h*0.4, gy-h*0.4);
  ctx.lineTo(sx+h*0.4, gy-h*0.4);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(sx, gy-h*1.2);
  ctx.lineTo(sx-h*0.3, gy-h*0.6);
  ctx.lineTo(sx+h*0.3, gy-h*0.6);
  ctx.closePath();
  ctx.fill();
}
function drawTombstone(sx, gy, h){
  ctx.fillStyle = '#3a3530';
  ctx.fillRect(sx-h*0.4, gy-h, h*0.8, h);
  ctx.beginPath();
  ctx.arc(sx, gy-h, h*0.4, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(sx-h*0.2, gy-h*0.6, h*0.05, h*0.3);
  ctx.fillRect(sx-h*0.05, gy-h*0.7, h*0.05, h*0.4);
}
function drawLavaCrack(sx, gy, h){
  ctx.fillStyle = '#1a0808';
  ctx.fillRect(sx-h*0.4, gy-h*0.6, h*0.8, h*0.6);
  ctx.fillStyle = '#ff4020';
  ctx.shadowColor = '#ff4020';
  ctx.shadowBlur = 10;
  ctx.fillRect(sx-h*0.15, gy-h*0.5, h*0.3, h*0.5);

}
function drawIcePeak(sx, gy, h){
  ctx.fillStyle = '#a8c8e8';
  ctx.beginPath();
  ctx.moveTo(sx, gy-h);
  ctx.lineTo(sx-h*0.4, gy);
  ctx.lineTo(sx+h*0.4, gy);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#e0f0ff';
  ctx.beginPath();
  ctx.moveTo(sx, gy-h);
  ctx.lineTo(sx-h*0.15, gy-h*0.5);
  ctx.lineTo(sx+h*0.1, gy-h*0.4);

}
function drawVoidCrystal(sx, gy, h){
  ctx.fillStyle = '#4a2080';
  ctx.shadowColor = '#a060d0';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(sx, gy-h);
  ctx.lineTo(sx-h*0.25, gy-h*0.5);
  ctx.lineTo(sx-h*0.15, gy);
  ctx.lineTo(sx+h*0.15, gy);
  ctx.lineTo(sx+h*0.25, gy-h*0.5);

function drawCosmicPillar(sx, gy, h){
  const grad = ctx.createLinearGradient(sx, gy-h, sx, gy);
  grad.addColorStop(0, '#a040ff');
  grad.addColorStop(0.5, '#4020a0');
  grad.addColorStop(1, '#100620');

  ctx.shadowBlur = 15;
  ctx.fillRect(sx-h*0.2, gy-h*1.2, h*0.4, h*1.2);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';

    ctx.beginPath();
    ctx.arc(sx+rand(-h*0.15,h*0.15), gy-h*0.8+i*h*0.3, 1.5, 0, Math.PI*2);

function drawPlatforms(){
  const w = canvas.clientWidth;
  game.platforms.forEach(pl=>{
    const sx = worldToScreenX(pl.worldX);
    const sy = worldToScreenY(pl.y);
    if(sx+pl.w/2 < -50 || sx-pl.w/2 > w+50) return;
    // 平台主體 - 深色石頭風格
    const grad = ctx.createLinearGradient(0, sy, 0, sy+pl.h);
    grad.addColorStop(0, '#5a4838');
    grad.addColorStop(0.5, '#3a2c20');
    grad.addColorStop(1, '#1a1208');
    ctx.fillStyle = grad;
    ctx.fillRect(sx-pl.w/2, sy, pl.w, pl.h);
    // 邊框金邊
    ctx.strokeStyle = 'rgba(224,168,80,0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx-pl.w/2, sy, pl.w, pl.h);
    // 頂部高光
    ctx.fillStyle = 'rgba(224,168,80,0.3)';
    ctx.fillRect(sx-pl.w/2, sy, pl.w, 2);
    // 底部陰影鬚 (掛在下方)
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    for(let i=0;i<3;i++){
      const px = sx - pl.w/2 + (i+1) * pl.w/4 - 4;
      ctx.beginPath();
      ctx.moveTo(px, sy+pl.h);
      ctx.lineTo(px+4, sy+pl.h+8);
      ctx.lineTo(px+8, sy+pl.h);
      ctx.closePath();
      ctx.fill();
    }
  });
}

function drawNpc(npc){
  const sx = worldToScreenX(npc.worldX);
  const gy = worldToScreenY(getGroundY());
  const t = NPC_TYPES[npc.type];
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(sx, gy, 18, 5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = t.color;
  ctx.fillRect(sx-12, gy-40, 24, 32);
  ctx.font = '28px serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(t.icon, sx, gy-52);
  if(game.nearbyNpc === npc){
    const bob = Math.sin(Date.now()*0.005)*4;
    ctx.fillStyle = '#e0a850';
    ctx.font = 'bold 18px "Cinzel", serif';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 4;
    ctx.fillText('!', sx, gy-80+bob);
    ctx.shadowBlur = 0;
  }
  ctx.fillStyle = '#e0d8c8';
  ctx.font = '10px "Cinzel", serif';
  ctx.shadowColor = '#000';ctx.shadowBlur=3;
  ctx.fillText(t.name, sx, gy-95);
  ctx.shadowBlur = 0;
}

function render(){
  const w = canvas.clientWidth, h = canvas.clientHeight;
  ctx.save();
  if(game.cameraShake>0){
    ctx.translate(rand(-game.cameraShake,game.cameraShake), rand(-game.cameraShake,game.cameraShake));
    game.cameraShake *= 0.85;
    if(game.cameraShake<0.5) game.cameraShake=0;
  }

  drawBackgroundLayers();

  // 平台 (在背景之上，物件之下)
  drawPlatforms();

  // NPCs
  game.npcs.forEach(npc=>{
    const sx = worldToScreenX(npc.worldX);
    if(sx<-100||sx>w+100) return;
    drawNpc(npc);
  });

  // 戰利品
  game.loot.forEach(L=>{
    const sx = worldToScreenX(L.worldX);
    const sy = worldToScreenY(L.y);
    if(sx<-50||sx>w+50) return;
    const bob = L.grounded ? Math.sin(L.glow)*3 : 0;
    if(L.potion){
      ctx.save();
      ctx.translate(sx, sy + bob);
      const g = ctx.createRadialGradient(0,0,0, 0,0,25);
      g.addColorStop(0,'rgba(255,80,80,0.5)');
      g.addColorStop(1,'rgba(255,80,80,0)');
      ctx.fillStyle = g;
      ctx.fillRect(-25,-25,50,50);
      ctx.font = '20px serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('🧪', 0, 0);
      ctx.restore();
    } else {
      const color = RARITY_COLORS[L.item.rarity];
      const isBook = L.item.kind === 'skillbook';
      ctx.save();
      ctx.translate(sx, sy + bob);
      const g = ctx.createRadialGradient(0,0,0, 0,0,30);
      g.addColorStop(0, color+'aa');
      g.addColorStop(1, color+'00');
      ctx.fillStyle = g;
      ctx.fillRect(-30,-30,60,60);
      ctx.font = '20px serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(L.item.icon, 0, 0);
      if(isBook){
        // 技能書浮動小圖示
        ctx.font = '12px serif';
        ctx.fillText('✨', 12, -12);
      }
      const dx = L.worldX - game.player.worldX;
      if(Math.abs(dx) < 100){
        ctx.font = 'bold 11px "Cinzel", serif';
        ctx.fillStyle = color;
        ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
        ctx.fillText(L.item.name, 0, -20);
        ctx.shadowBlur = 0;
      }
      ctx.restore();
    }
  });

  // 怪物
  game.monsters.forEach(m=>{
    const sx = worldToScreenX(m.worldX);
    const sy = worldToScreenY(m.y);
    if(sx<-80||sx>w+80) return;
    ctx.save();
    ctx.translate(sx, sy);
    let alpha = 1;
    if(m.dead){ alpha = m.deathT/0.5; ctx.translate(0, (1-alpha)*20); }
    ctx.globalAlpha = alpha;
    // 精英怪 / Boss 光暈
    if(m.isElite && !m.dead){
      const glowT = performance.now()*0.003;
      const gr = m.size*1.2 + Math.sin(glowT)*4;
      const gg = ctx.createRadialGradient(0,-m.size*0.2,0, 0,-m.size*0.2,gr);
      gg.addColorStop(0, 'rgba(255,210,80,0.5)');
      gg.addColorStop(1, 'rgba(255,210,80,0)');
      ctx.fillStyle = gg;
      ctx.fillRect(-gr,-gr-m.size*0.2,gr*2,gr*2);
    }
    if(m.isBoss && !m.dead){
      const glowT = performance.now()*0.003;
      const gr = m.size*1.5 + Math.sin(glowT)*6;
      const c = m.bossDef.color;
      const gg = ctx.createRadialGradient(0,-m.size*0.2,0, 0,-m.size*0.2,gr);
      gg.addColorStop(0, c+'aa');
      gg.addColorStop(1, c+'00');
      ctx.fillStyle = gg;
      ctx.fillRect(-gr,-gr-m.size*0.2,gr*2,gr*2);
    }
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.ellipse(0, m.size*0.35, m.size*0.5, m.size*0.12, 0, 0, Math.PI*2);
    ctx.fill();
    if(m.hitT>0){ ctx.shadowColor='#fff'; ctx.shadowBlur=20; }
    if(m.slowT>0){ ctx.shadowColor='#80c0ff'; ctx.shadowBlur=14; }
    ctx.font = m.size+'px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    if(m.facing<0) ctx.scale(-1,1);
    ctx.fillText(m.art, 0, -m.size*0.15);
    ctx.shadowBlur = 0;
    ctx.restore();
    if(!m.dead && !m.isBoss){
      const bw = m.size*1.2;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(sx-bw/2, sy-m.size*0.7-8, bw, 4);
      ctx.fillStyle = m.isElite ? '#e0a850' : '#d83828';
      ctx.fillRect(sx-bw/2, sy-m.size*0.7-8, bw*(m.hp/m.hpMax), 4);
      ctx.fillStyle = m.isElite ? '#e0a850' : '#9a8d75';
      ctx.font = m.isElite ? 'bold 10px "JetBrains Mono"' : '9px "JetBrains Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(`Lv.${m.lv} ${m.name}`, sx, sy-m.size*0.7-12);
    }
  });

  // 投射物
  game.projectiles.forEach(pr=>{
    const sx = worldToScreenX(pr.worldX);
    const sy = worldToScreenY(pr.y);
    if(sx<-50||sx>w+50) return;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(Math.atan2(pr.vy, pr.vx));
    const grad2 = ctx.createLinearGradient(-30,0,5,0);
    grad2.addColorStop(0, pr.color+'00');
    grad2.addColorStop(1, pr.color+'ff');
    ctx.fillStyle = grad2;
    ctx.fillRect(-30, -pr.size/2, 35, pr.size);
    ctx.fillStyle = pr.color;
    ctx.beginPath();
    ctx.moveTo(8,0);
    ctx.lineTo(-2,-pr.size);
    ctx.lineTo(-2,pr.size);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  });

  // 寵物
  const p_for_pet = game.player;
  if(p_for_pet.petId && PETS[p_for_pet.petId]){
    const pet = PETS[p_for_pet.petId];
    const psx_pet = worldToScreenX(game.petX);
    const psy_pet = worldToScreenY(game.petY);
    if(psx_pet > -50 && psx_pet < w+50){
      ctx.save();
      ctx.translate(psx_pet, psy_pet);
      // 寵物光暈
      const glowT = performance.now()*0.003;
      const gr = 24 + Math.sin(glowT)*3;
      const gg = ctx.createRadialGradient(0,0,0, 0,0,gr);
      gg.addColorStop(0, pet.color+'88');
      gg.addColorStop(1, pet.color+'00');
      ctx.fillStyle = gg;
      ctx.fillRect(-gr,-gr,gr*2,gr*2);
      // 寵物本體
      ctx.font = '26px serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(pet.art, 0, 0);
      ctx.restore();
    }
  }

  // 玩家
  const p = game.player;
  const psx = worldToScreenX(p.worldX);
  const psy = worldToScreenY(p.y);
  ctx.save();
  ctx.translate(psx, psy);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.ellipse(0, 0, 18, 6, 0, 0, Math.PI*2);
  ctx.fill();
  if(p.invincible>0 && Math.floor(p.invincible*20)%2===0) ctx.globalAlpha = 0.5;
  // 腿
  ctx.fillStyle = '#2a1810';
  // 跳躍時腳收起
  const isJumping = !p.onGround;
  if(isJumping){
    ctx.fillRect(-9, -20, 6, 14);
    ctx.fillRect(3, -20, 6, 14);
  } else {
    ctx.fillRect(-8, -20, 6, 18);
    ctx.fillRect(2, -20, 6, 18);
  }
  // 身體
  ctx.fillStyle = '#3a2818';
  ctx.strokeStyle = '#e0a850';
  ctx.lineWidth = 2;
  ctx.fillRect(-12, -42, 24, 24);
  ctx.strokeRect(-12, -42, 24, 24);
  if(game.equipment.chest){
    ctx.fillStyle = RARITY_COLORS[game.equipment.chest.rarity];
    const a0 = ctx.globalAlpha;
    ctx.globalAlpha = a0 * 0.35;
    ctx.fillRect(-12, -42, 24, 24);
    ctx.globalAlpha = a0;
  }
  ctx.fillStyle = '#d8c8a0';
  ctx.beginPath();
  ctx.arc(0, -52, 8, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#1a1008';
  ctx.lineWidth = 1;
  ctx.stroke();
  // 武器
  const w_def = WEAPONS[p.weapon];
  ctx.save();
  ctx.scale(p.facing, 1);
  if(p.isSwinging){
    const t = 1 - (p.swingT / w_def.swingTime);
    if(w_def.ranged){
      ctx.font = '20px serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('🏹', 16, -30);
    } else {
      const swingArc = Math.PI*0.8;
      const startA = -Math.PI/2 - swingArc/2;
      const curA = startA + swingArc * t;
      ctx.strokeStyle = `rgba(255,200,80,${1-t})`;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, -30, w_def.range*0.75, startA, curA);
      ctx.stroke();
      ctx.save();
      ctx.translate(0, -30);
      ctx.rotate(curA);
      ctx.font = '22px serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(w_def.icon, w_def.range*0.6, 0);
      ctx.restore();
    }
  } else {
    ctx.font = '18px serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(w_def.icon, 16, -30);
  }
  ctx.restore();
  ctx.restore();

  // 效果
  game.effects.forEach(e=>{
    const sx = worldToScreenX(e.worldX);
    const sy = worldToScreenY(e.y);
    const t = 1 - (e.life / e.maxLife);
    ctx.save();
    ctx.translate(sx, sy);
    if(e.type==='slash'){
      const w_d = WEAPONS[game.player.weapon];
      ctx.scale(e.dir, 1);
      ctx.strokeStyle = `rgba(255,220,120,${1-t})`;
      ctx.lineWidth = 6+(1-t)*4;
      ctx.beginPath();
      ctx.arc(0,0, w_d.range*0.5, -Math.PI/2.5, Math.PI/2.5);
      ctx.stroke();
    }
    if(e.type==='pierce'){
      ctx.scale(e.dir, 1);
      const grad3 = ctx.createLinearGradient(0,0, e.len,0);
      grad3.addColorStop(0,`rgba(255,200,80,${1-t})`);
      grad3.addColorStop(1,`rgba(255,200,80,0)`);
      ctx.fillStyle = grad3;
      ctx.fillRect(0,-10,e.len,20);
      ctx.strokeStyle = `rgba(255,255,255,${1-t})`;
      ctx.lineWidth = 2;
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(e.len,0);ctx.stroke();
    }
    if(e.type==='spin'){
      ctx.strokeStyle = `rgba(255,180,80,${1-t})`;
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.arc(0,0, e.radius*(0.4+t*0.6), 0, Math.PI*2);
      ctx.stroke();
    }
    if(e.type==='meteor_warn'){
      ctx.strokeStyle = `rgba(255,80,40,${0.4+Math.sin(t*20)*0.3})`;
      ctx.lineWidth = 3;
      ctx.setLineDash([6,4]);
      ctx.beginPath();
      ctx.arc(0,0, 100, 0, Math.PI*2);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    if(e.type==='explosion'){
      const r = e.radius*(0.3+t*0.9);
      const g = ctx.createRadialGradient(0,0,0,0,0,r);
      g.addColorStop(0,`rgba(255,240,180,${1-t})`);
      g.addColorStop(0.4,`rgba(255,120,40,${0.8*(1-t)})`);
      g.addColorStop(1,'rgba(120,20,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
    }
    if(e.type==='heal'){
      ctx.strokeStyle = `rgba(120,255,120,${1-t})`;
      ctx.lineWidth = 3;
      ctx.beginPath();ctx.arc(0,0, 30*(1+t),0,Math.PI*2);ctx.stroke();
      for(let i=0;i<5;i++){
        const ang = i/5*Math.PI*2 + t*2;
        const r = 20+t*15;
        ctx.fillStyle = `rgba(180,255,180,${1-t})`;
        ctx.beginPath();
        ctx.arc(Math.cos(ang)*r, Math.sin(ang)*r-t*20, 3, 0, Math.PI*2);
        ctx.fill();
      }
    }
    if(e.type==='dash'||e.type==='dash_trail'){
      ctx.fillStyle = `rgba(180,180,255,${(1-t)*0.5})`;
      ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.fill();
    }
    if(e.type==='muzzle'){
      ctx.fillStyle = `rgba(255,220,120,${1-t})`;
      ctx.beginPath();ctx.arc(0,0,8*(1-t)+2,0,Math.PI*2);ctx.fill();
    }
    if(e.type==='jump_dust'){
      ctx.fillStyle = `rgba(200,180,140,${(1-t)*0.6})`;
      for(let i=-1;i<=1;i+=2){
        ctx.beginPath();
        ctx.arc(i*(5+t*10), 0, 4*(1-t)+1, 0, Math.PI*2);
        ctx.fill();
      }
    }
    if(e.type==='lightning'){
      ctx.translate(-sx,-sy); // 反平移用 worldX
      const x1 = worldToScreenX(e.x1), y1 = worldToScreenY(e.y1);
      const x2 = worldToScreenX(e.x2), y2 = worldToScreenY(e.y2);
      ctx.strokeStyle = `rgba(180,220,255,${1-t})`;
      ctx.lineWidth = 3;
      ctx.shadowColor = '#80c0ff';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.moveTo(x1,y1);
      const segs = 6;
      for(let i=1;i<segs;i++){
        const pp = i/segs;
        const mx = x1 + (x2-x1)*pp + rand(-15,15);
        const my = y1 + (y2-y1)*pp + rand(-15,15);
        ctx.lineTo(mx,my);
      }
      ctx.lineTo(x2,y2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    if(e.type==='ice_nova'){
      const r = e.radius*(0.3+t*0.9);
      ctx.strokeStyle = `rgba(150,220,255,${1-t})`;
      ctx.lineWidth = 4;
      ctx.shadowColor = '#80c0ff';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(0,0, r, 0, Math.PI*2);
      ctx.stroke();
      ctx.shadowBlur = 0;
      // 冰晶
      for(let i=0;i<8;i++){
        const ang = i/8*Math.PI*2;
        const x = Math.cos(ang)*r;
        const y = Math.sin(ang)*r;
        ctx.fillStyle = `rgba(220,240,255,${1-t})`;
        ctx.beginPath();
        ctx.moveTo(x, y-6);
        ctx.lineTo(x+4, y);
        ctx.lineTo(x, y+6);
        ctx.lineTo(x-4, y);
        ctx.closePath();
        ctx.fill();
      }
    }
    ctx.restore();
  });

  // 隨機事件物件
  game.events.forEach(evt=>{
    if(evt.used) return;
    const sx = worldToScreenX(evt.worldX);
    if(sx<-80||sx>w+80) return;
    const sy = worldToScreenY(getGroundY()-40);
    const t = EVENT_TYPES[evt.type];
    const bob = Math.sin(performance.now()*0.003 + evt.worldX*0.01) * 4;
    ctx.save();
    ctx.translate(sx, sy+bob);
    // 光暈
    const grad = ctx.createRadialGradient(0,0,0, 0,0,50);
    grad.addColorStop(0, t.color+'aa');
    grad.addColorStop(1, t.color+'00');
    ctx.fillStyle = grad;
    ctx.fillRect(-50,-50,100,100);
    // 圖標
    ctx.font = '40px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(t.icon, 0, 0);
    // 名稱
    ctx.fillStyle = t.color;
    ctx.font = 'bold 11px "Noto Serif TC"';
    ctx.fillText(t.name, 0, 32);
    ctx.restore();
  });

  // Boss 寶箱
  game.treasureBoxes.forEach(tb=>{
    const sx = worldToScreenX(tb.worldX);
    if(sx<-80||sx>w+80) return;
    tb.bobT += 0.05;
    const sy = worldToScreenY(tb.y);
    const bob = Math.sin(tb.bobT) * 4;
    ctx.save();
    ctx.translate(sx, sy+bob);
    // 強烈光暈
    const grad = ctx.createRadialGradient(0,0,0, 0,0,70);
    grad.addColorStop(0, 'rgba(255,210,80,0.7)');
    grad.addColorStop(1, 'rgba(255,210,80,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(-70,-70,140,140);
    // 寶箱
    ctx.font = '50px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🎁', 0, 0);
    // 提示
    ctx.fillStyle = '#e0a850';
    ctx.font = 'bold 12px "Noto Serif TC"';
    ctx.fillText('Boss 寶箱 [F]', 0, 36);
    ctx.restore();
  });

  // Boss HP bar (頂部置中)
  const boss = game.monsters.find(m=>m.isBoss && !m.dead);
  if(boss){
    const cw = canvas.clientWidth;
    const bx = cw/2 - 220;
    const by = 28;
    ctx.fillStyle = 'rgba(10,5,5,0.85)';
    ctx.fillRect(bx-4, by-22, 448, 50);
    ctx.strokeStyle = boss.bossDef.color;
    ctx.lineWidth = 2;
    ctx.strokeRect(bx-4, by-22, 448, 50);
    // 名稱
    ctx.fillStyle = '#e8dcc4';
    ctx.font = 'bold 14px "Noto Serif TC"';
    ctx.textAlign = 'center';
    ctx.fillText(`⚠ Boss · ${boss.bossDef.name}`, cw/2, by-6);
    // HP bar
    ctx.fillStyle = '#1a0606';
    ctx.fillRect(bx, by, 440, 14);
    ctx.fillStyle = boss.bossDef.color;
    ctx.fillRect(bx, by, 440*(boss.hp/boss.hpMax), 14);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, 440, 14);
    ctx.fillStyle='#e8dcc4';
    ctx.font='11px "JetBrains Mono"';
    ctx.fillText(`${boss.hp} / ${boss.hpMax}`, cw/2, by+11);
  }

  // 傷害文字
  game.damageTexts.forEach(d=>{
    const sx = worldToScreenX(d.worldX);
    const sy = worldToScreenY(d.y);
    const a = Math.min(1,d.life*2);
    ctx.save();
    ctx.font = `bold ${d.size}px "Cinzel", serif`;
    ctx.textAlign='center';
    ctx.fillStyle = d.color;
    ctx.globalAlpha = a;
    ctx.shadowColor='#000';ctx.shadowBlur=4;
    ctx.fillText(d.text, sx, sy);
    ctx.restore();
  });

  ctx.restore();
}

/* ============================================================
   SHOP
   ============================================================ */
function openShop(npc){
  game.shopOpen = true;
  game.shopNpc = npc;
  game.shopTab = 'buy';
  const t = NPC_TYPES[npc.type];
  $('shopTitle').textContent = t.title;
  $('shopModal').classList.add('show');
  document.querySelectorAll('.shop-tab').forEach(tab=>{
    tab.classList.toggle('active', tab.dataset.tab==='buy');
  });
  // 銀行用特殊介面
  if(t.isBanker){
    renderBanker();
  } else if(t.isPetShop){
    renderPetShop();
  } else {
    renderShop();
  }
}
function renderBanker(){
  const body = $('shopBody');
  const p = game.player;
  body.innerHTML = `
    <div class="banker-panel">
      <div class="banker-title">🏦 銀行存款服務</div>
      <div class="banker-desc">將金幣存入銀行，死亡時不會扣除。</div>
      <div class="banker-stat">
        <div><span class="bk-label">手上金幣</span><span class="bk-val">💰 ${p.gold}</span></div>
        <div><span class="bk-label">銀行存款</span><span class="bk-val">🏦 ${p.bank}</span></div>
      </div>
      <div class="banker-actions">
        <div class="banker-row">
          <button data-act="deposit" data-amt="100">存 100</button>
          <button data-act="deposit" data-amt="500">存 500</button>
          <button data-act="deposit" data-amt="all">全部存入</button>
        </div>
        <div class="banker-row">
          <button data-act="withdraw" data-amt="100">取 100</button>
          <button data-act="withdraw" data-amt="500">取 500</button>
          <button data-act="withdraw" data-amt="all">全部領出</button>
        </div>
      </div>
      <div class="banker-tip">💡 死亡會損失 20% 持有金幣，存銀行則完全安全</div>
    </div>
  `;
  body.querySelectorAll('button[data-act]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const act = btn.dataset.act;
      const amt = btn.dataset.amt;
      bankerOp(act, amt);
    });
  });
}
function bankerOp(act, amt){
  const p = game.player;
  if(act==='deposit'){
    let n = amt==='all' ? p.gold : parseInt(amt);
    n = Math.min(n, p.gold);
    if(n<=0){ logMsg('沒有金幣可存'); return; }
    p.gold -= n; p.bank += n;
    logMsg(`存入 ${n} 金幣`,'good');
  } else if(act==='withdraw'){
    let n = amt==='all' ? p.bank : parseInt(amt);
    n = Math.min(n, p.bank);
    if(n<=0){ logMsg('銀行沒有存款'); return; }
    p.bank -= n; p.gold += n;
    logMsg(`領出 ${n} 金幣`);
  }
  renderBanker();
  updateUI();
}

function renderPetShop(){
  const body = $('shopBody');
  const p = game.player;
  body.innerHTML = `
    <div class="petshop-panel">
      <div class="petshop-title">🧝 馴獸師的小屋</div>
      <div class="petshop-desc">這裡有各種魔法寵物，購買後會跟隨你戰鬥。</div>
      <div class="petshop-current">
        ${p.petId ? `<div>目前夥伴：<span style="color:${PETS[p.petId].color}">${PETS[p.petId].art} ${PETS[p.petId].name}</span> <button class="pet-unsummon" data-act="unsummon">收回</button></div>` : '<div style="color:var(--ink-dim)">目前無寵物</div>'}
      </div>
      <div class="petshop-grid">
        ${Object.values(PETS).map(pet=>{
          const owned = p.ownedPets.includes(pet.id);
          const active = p.petId === pet.id;
          const bonuses = [];
          if(pet.atkMult) bonuses.push(`攻擊 ${Math.round(pet.atkMult*100)}%`);
          if(pet.critBonus) bonuses.push(`暴擊 +${Math.round(pet.critBonus*100)}%`);
          if(pet.hpBonus) bonuses.push(`HP +${Math.round(pet.hpBonus*100)}%`);
          if(pet.dropBonus) bonuses.push(`掉寶 +${Math.round(pet.dropBonus*100)}%`);
          if(pet.lifesteal) bonuses.push(`吸血 +${Math.round(pet.lifesteal*100)}%`);
          if(pet.regen) bonuses.push(`回血 +${Math.round(pet.regen*1000)/10}%/s`);
          return `
            <div class="pet-card" style="--pc:${pet.color}">
              <div class="pet-art">${pet.art}</div>
              <div class="pet-name" style="color:${RARITY_COLORS[pet.rarity]}">${pet.name}</div>
              <div class="pet-desc">${pet.desc}</div>
              <div class="pet-stats">${bonuses.join(' · ')}</div>
              <div class="pet-price">${owned ? '已擁有' : `💰 ${pet.price}`}</div>
              ${owned ? 
                (active ? '<div class="pet-active">出戰中</div>' : `<button class="pet-summon" data-pet="${pet.id}" data-act="summon">出戰</button>`) :
                `<button class="pet-buy" data-pet="${pet.id}" data-act="buy" ${p.gold<pet.price?'disabled':''}>購買</button>`}
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
  body.querySelectorAll('button[data-act]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const act = btn.dataset.act;
      const petId = btn.dataset.pet;
      petShopOp(act, petId);
    });
  });
}

function petShopOp(act, petId){
  const p = game.player;
  if(act==='buy'){
    const pet = PETS[petId];
    if(!pet) return;
    if(p.gold < pet.price){ logMsg('金幣不足'); return; }
    p.gold -= pet.price;
    p.ownedPets.push(petId);
    p.petId = petId; // 自動出戰
    initPetPos();
    logMsg(`購得 ${pet.name} 並設為夥伴！`,'good');
  } else if(act==='summon'){
    p.petId = petId;
    initPetPos();
    logMsg(`${PETS[petId].name} 出戰！`,'good');
  } else if(act==='unsummon'){
    p.petId = null;
    logMsg('寵物已收回');
  }
  saveGame();
  renderPetShop();
  updateUI();
}

function initPetPos(){
  const p = game.player;
  game.petX = p.worldX - p.facing*40;
  game.petY = p.y - 30;
  game.petVx = 0; game.petVy = 0;
  game.petAtkT = 0;
}

function closeShop(){
  game.shopOpen = false;
  game.shopNpc = null;
  $('shopModal').classList.remove('show');
}
function renderShop(){
  const body = $('shopBody');
  body.innerHTML = '';
  if(game.shopTab === 'buy'){
    const npc = game.shopNpc;
    const t = NPC_TYPES[npc.type];
    let items = t.items;
    if(npc.type === 'blacksmith'){
      items = [];
      const lv = Math.max(1, game.player.lv);
      const offerSlots = ['weapon','helm','chest','boots','gloves'];
      offerSlots.forEach((s,i)=>{
        const it = generateItem(s, lv, 0);
        if(it.rarity==='grey'||it.rarity==='white') it.rarity='green';
        items.push({
          type:'equipment', item:it,
          basePrice: (lv+1)*30*(RARITY_ORDER.indexOf(it.rarity)+1),
        });
      });
    }
    items.forEach((it,idx)=>{
      const div = document.createElement('div');
      div.className = 'shop-item';
      const price = it.basePrice;
      const canAfford = game.player.gold >= price;
      if(!canAfford) div.classList.add('disabled');
      if(it.type==='equipment'){
        const item = it.item;
        div.classList.add(`rarity-${item.rarity}`);
        let stats = `Lv.${item.lv}`;
        if(item.atk) stats += ` · +${item.atk} 攻`;
        if(item.armor) stats += ` · +${item.armor} 防`;
        const mainStat = Object.entries(item.stats)[0];
        if(mainStat) stats += ` · +${mainStat[1]} ${STATS[mainStat[0]].name}`;
        div.innerHTML = `
          <div class="si-icon">${item.icon}</div>
          <div class="si-name" style="color:${RARITY_COLORS[item.rarity]}">${item.name}</div>
          <div class="si-desc">${stats}</div>
          <div class="si-price">💰 ${price}</div>`;
        div.onmouseenter = e=>showTooltip(e, item, 'buy');
        div.onmousemove = moveTooltip;
        div.onmouseleave = hideTooltip;
        div.onclick = ()=>buyEquipment(it, idx);
      } else {
        div.innerHTML = `
          <div class="si-icon">${it.icon}</div>
          <div class="si-name">${it.name}</div>
          <div class="si-desc">${it.desc}</div>
          <div class="si-price">💰 ${price}</div>`;
        div.onclick = ()=>buyConsumable(it);
      }
      body.appendChild(div);
    });
    if(items.length===0){
      body.innerHTML = '<div class="shop-empty">沒有商品</div>';
    }
  } else {
    if(game.inventory.length===0){
      body.innerHTML = '<div class="shop-empty">背包沒有可出售的物品</div>';
      return;
    }
    game.inventory.forEach((it,idx)=>{
      const price = itemSellPrice(it);
      const div = document.createElement('div');
      div.className = 'shop-item';
      div.classList.add(`rarity-${it.rarity}`);
      let stats = `Lv.${it.lv}`;
      if(it.kind==='skillbook'){
        const sk = SKILL_DEFS[it.skillId];
        stats = `${sk?.kind==='active'?'主動':'被動'}技能書`;
      } else {
        if(it.atk) stats += ` · +${it.atk} 攻`;
        if(it.armor) stats += ` · +${it.armor} 防`;
      }
      div.innerHTML = `
        <div class="si-icon">${it.icon}</div>
        <div class="si-name" style="color:${RARITY_COLORS[it.rarity]}">${it.name}</div>
        <div class="si-desc">${stats}</div>
        <div class="si-price">💰 +${price}</div>`;
      div.onmouseenter = e=>showTooltip(e, it, 'sell');
      div.onmousemove = moveTooltip;
      div.onmouseleave = hideTooltip;
      div.onclick = ()=>sellInventoryItem(idx);
      body.appendChild(div);
    });
  }
}
function itemSellPrice(it){
  const base = (it.lv+1)*(RARITY_ORDER.indexOf(it.rarity)+1)*3;
  return Math.floor(it.kind==='skillbook' ? base*2 : base);
}
function buyEquipment(it, idx){
  if(game.player.gold < it.basePrice){ logMsg('金幣不足'); return; }
  if(game.inventory.length >= game.inventoryMax){ logMsg('背包已滿'); return; }
  game.player.gold -= it.basePrice;
  game.inventory.push(it.item);
  logMsg(`購入 ${it.item.name}`,'good');
  hideTooltip();
  renderShop();
  updateUI();
}
function buyConsumable(it){
  if(game.player.gold < it.basePrice){ logMsg('金幣不足'); return; }
  game.player.gold -= it.basePrice;
  if(it.type==='potion'){
    game.player.potions++;
    logMsg(`購入 ${it.name}`,'good');
  } else if(it.type==='mana_potion'){
    const d = getDerived();
    game.player.mp = Math.min(d.mpMax, game.player.mp + Math.floor(d.mpMax*0.5));
    logMsg(`使用 ${it.name}`,'good');
  } else if(it.type==='town_scroll'){
    let nearest = VILLAGES[0];
    let bestDist = Infinity;
    for(const v of VILLAGES){
      const dist = Math.abs(v.worldX - game.player.worldX);
      if(dist < bestDist){ bestDist = dist; nearest = v; }
    }
    game.player.worldX = nearest.worldX + 200;
    game.player.y = getGroundY();
    game.player.vy = 0;
    game.monsters = [];
    logMsg(`傳送至 ${nearest.name}`,'good');
    closeShop();
  } else if(it.type==='stat_potion'){
    game.player.statPoints += 2;
    logMsg('獲得 +2 屬性點','good');
  } else if(it.type==='reroll'){
    if(!game.equipment.weapon){ logMsg('無武器可重鑄'); game.player.gold += it.basePrice; return; }
    const w = game.equipment.weapon;
    const newItem = generateItem('weapon', w.lv, getDerived().luckRarity);
    game.equipment.weapon = newItem;
    logMsg(`重鑄: ${newItem.name}`,'good');
  } else if(it.type==='skill_book_random'){
    // 給玩家一本隨機技能書 (有 30% 機率是已學過的，會自動轉成金幣)
    const book = generateSkillBook(game.player.lv+2, getDerived().luckRarity);
    if(game.inventory.length<game.inventoryMax){
      game.inventory.push(book);
      logMsg(`購入 ${book.name}`,'skill');
    } else {
      learnSkill(book.skillId);
    }
  } else if(it.type==='luck_potion'){
    game.player.buffs.luck = 300;
    logMsg('幸運加成 5 分鐘','good');
  } else if(it.type==='xp_potion'){
    game.player.buffs.xp = 300;
    logMsg('經驗加成 5 分鐘','good');
  } else if(it.type==='mystery_purple'){
    // 隨機紫色裝備
    const slotKey = choice(SLOT_ORDER);
    const item = generateItem(slotKey, game.player.lv+3, 50);
    item.rarity = Math.random()<0.85 ? 'purple' : 'orange';
    const r = RARITIES[item.rarity];
    const pool = Object.keys(STATS);
    const stats={}, chosen=[];
    for(let i=0;i<r.statCount;i++){
      const s = choice(pool);
      if(chosen.includes(s)) continue;
      chosen.push(s);
      stats[s] = Math.floor((1+game.player.lv*0.5) * r.statMult * rand(0.8,1.2));
    }
    item.stats = stats;
    if(game.inventory.length<game.inventoryMax){
      game.inventory.push(item);
      logMsg(`購入 ${item.name} [${RARITIES[item.rarity].name}]`,'drop');
    }
  } else if(it.type==='skill_book_rare'){
    const book = generateSkillBook(game.player.lv+3, 80);
    book.rarity = Math.random()<0.5 ? 'purple' : 'orange';
    if(game.inventory.length<game.inventoryMax){
      game.inventory.push(book);
      logMsg(`購入 ${book.name} [稀有]`,'skill');
    }
  } else if(it.type==='big_heal'){
    const d = getDerived();
    game.player.hp = d.hpMax;
    game.player.mp = d.mpMax;
    logMsg('全滿恢復！','good');
  } else if(it.type==='inv_expand'){
    game.inventoryMax += 5;
    logMsg(`背包擴充至 ${game.inventoryMax} 格`,'good');
  }
  renderShop();
  updateUI();
}
function sellInventoryItem(idx){
  const it = game.inventory[idx];
  const price = itemSellPrice(it);
  game.player.gold += price;
  game.inventory.splice(idx,1);
  logMsg(`賣出 ${it.name} +${price}`);
  hideTooltip();
  renderShop();
  updateUI();
}

function renderSkillPanel(){
  const body = $('skillBody');

  const p = game.player;

  // 主動槽位
  const activeSec = document.createElement('div');
  activeSec.innerHTML = '<div class="skill-section-title">主動技能槽 (X / C / V) — 點擊可解除</div>';
  const activeGrid = document.createElement('div');
  activeGrid.className = 'equipped-skills';
  ['X','C','V'].forEach((key,i)=>{
    const card = document.createElement('div');
    card.className = 'skill-card active-card';
    const sid = p.activeSlots[i];
    if(sid){
      const sk = SKILL_DEFS[sid];
      card.innerHTML = `
        <div class="sc-icon">${sk.icon}</div>
        <div class="sc-info">
          <div class="sc-name" style="color:${RARITY_COLORS[sk.rarity]}">[${key}] ${sk.name}</div>
          <div class="sc-desc">MP ${sk.cost} · CD ${sk.cooldown}s</div>
        </div>`;
      card.onclick = ()=>{
        p.activeSlots[i] = null;
        renderSkillPanel(); updateUI();
      };
    } else {
      card.classList.add('empty');
      card.textContent = `[${key}] 空槽位`;
    }
    activeGrid.appendChild(card);
  });
  activeSec.appendChild(activeGrid);
  body.appendChild(activeSec);

  // 被動槽位
  const passiveSec = document.createElement('div');
  passiveSec.innerHTML = '<div class="skill-section-title">被動技能槽 (永久生效) — 點擊可解除</div>';
  const passiveGrid = document.createElement('div');
  passiveGrid.className = 'equipped-skills';
  for(let i=0;i<3;i++){
    const card = document.createElement('div');
    card.className = 'skill-card';
    const sid = p.passiveSlots[i];
    if(sid){
      const sk = SKILL_DEFS[sid];
      card.innerHTML = `
        <div class="sc-icon">${sk.icon}</div>
        <div class="sc-info">
          <div class="sc-name" style="color:${RARITY_COLORS[sk.rarity]}">${sk.name}</div>
          <div class="sc-desc">${sk.desc}</div>
        </div>`;
      card.onclick = ()=>{
        p.passiveSlots[i] = null;
        renderSkillPanel(); updateUI();
      };
    } else {
      card.classList.add('empty');
      card.textContent = '被動空槽';
    }
    passiveGrid.appendChild(card);
  }
  passiveSec.appendChild(passiveGrid);
  body.appendChild(passiveSec);

  // 技能庫
  const libSec = document.createElement('div');
  libSec.innerHTML = '<div class="skill-section-title">已學會的技能 — 點擊裝備</div>';
  const lib = document.createElement('div');
  lib.className = 'skill-library';
  if(p.learnedSkills.length===0){
    lib.innerHTML = '<div class="library-empty">尚未學會任何技能<br>擊敗怪物有機率掉落技能書</div>';
  } else {
    p.learnedSkills.forEach(sid=>{
      const sk = SKILL_DEFS[sid];
      if(!sk) return;
      const card = document.createElement('div');
      card.className = 'skill-card';
      const isActive = sk.kind==='active';
      if(isActive) card.classList.add('active-card');
      const equipped = isActive ? p.activeSlots.includes(sid) : p.passiveSlots.includes(sid);
      const subInfo = isActive
        ? `MP ${sk.cost} · CD ${sk.cooldown}s · ${sk.desc}`
        : sk.desc;
      card.innerHTML = `
        <div class="sc-icon">${sk.icon}</div>

        card.style.opacity = '0.5';
      }
      lib.appendChild(card);
    });
  }
  libSec.appendChild(lib);
  body.appendChild(libSec);
}
function equipSkill(sid){
  const p = game.player;
  const sk = SKILL_DEFS[sid];
  if(!sk) return;
  if(sk.kind==='active'){
    const idx = p.activeSlots.indexOf(null);
    if(idx<0){ logMsg('主動技能槽已滿，先從面板點擊解除'); return; }
    p.activeSlots[idx] = sid;
  } else {
    const idx = p.passiveSlots.indexOf(null);
    if(idx<0){ logMsg('被動技能槽已滿，先從面板點擊解除'); return; }
    p.passiveSlots[idx] = sid;
  }
  renderSkillPanel();
  updateUI();
}

  p.mp = Math.min(p.mp, d.mpMax);
  $('charLv').textContent = p.lv;
  $('charXp').textContent = `${p.xp}/${xpNeeded(p.lv)}`;
  $('hpText').textContent = `${p.hp}/${d.hpMax}`;
  $('mpText').textContent = `${p.mp}/${d.mpMax}`;

  $('mpBar').style.width = (p.mp/d.mpMax*100)+'%';

  $('hKills').textContent = p.kills;
  $('hGold').textContent = p.gold;

  });
  [
    ['⚔ 攻', d.atk], ['🔥 魔攻', d.magic],
    ['🎯 爆', Math.floor(d.critChance*100)+'%'], ['💥 爆傷', Math.floor(d.critDmg*100)+'%'],
    ['💨 閃', Math.floor(d.dodge*100)+'%'], ['🛡 減', Math.floor(d.armorReduce*100)+'%'],
  ].forEach(([k,v])=>{
    const row = document.createElement('div');
    row.className='stat-row';
    row.style.borderLeftColor='var(--gold)';

  const buffNames = {luck:'🍀 幸運', xp:'⭐ 經驗'};
  Object.entries(p.buffs).forEach(([k,t])=>{
    const row = document.createElement('div');
    row.className = 'stat-row';
    row.style.borderLeftColor = 'var(--purple)';
    row.style.gridColumn = '1 / span 2';
    row.innerHTML = `<span class="k">${buffNames[k]||k}</span><span class="v">${Math.ceil(t)}s</span>`;
    sg.appendChild(row);
  });

  // 職業顯示
  const jd = $('jobDisplay');
  if(jd){
    if(p.job && JOBS[p.job]){
      const j = JOBS[p.job];
      const wp = WEAPONS[p.weapon];
      jd.innerHTML = `

function moveTooltip(e){
  const tt = $('tooltip');
  let x = e.clientX+12, y = e.clientY+12;
  const rect = tt.getBoundingClientRect();
  if(x+rect.width > window.innerWidth) x = e.clientX-rect.width-12;
  if(y+rect.height > window.innerHeight) y = e.clientY-rect.height-12;
  tt.style.left = x+'px';
  tt.style.top = y+'px';
}

const touchInput = {
  joystickX:0,        // -1 ~ 1
  downHeld:false,
};

function isTouchDevice(){
  return ('ontouchstart' in window) || (navigator.maxTouchPoints>0) || window.matchMedia('(pointer:coarse)').matches;
}

  document.body.classList.add('touch-mode');

}

// === 虛擬搖桿 ===
(function(){
  const stick = document.getElementById('touchJoystick');
  const knob = document.getElementById('touchKnob');
  if(!stick) return;
  let activeId = null;
  const updateKnob = (clientX, clientY)=>{
    const rect = stick.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    let dx = clientX - cx;
    let dy = clientY - cy;
    const maxR = rect.width/2 - 10;
    const dist = Math.hypot(dx, dy);
    if(dist > maxR){
      dx = dx/dist * maxR;
      dy = dy/dist * maxR;
    }
    knob.style.transform = `translate(${dx}px, ${dy}px)`;
    // 死區
    const deadZone = 15;
    if(Math.abs(dx) < deadZone){ touchInput.joystickX = 0; }
    else {
      touchInput.joystickX = Math.max(-1, Math.min(1, dx / maxR));
    }
    touchInput.downHeld = (dy > maxR*0.55);
  };
  const start = e=>{
    const t = e.changedTouches ? e.changedTouches[0] : e;
    activeId = e.changedTouches ? t.identifier : 'mouse';
    updateKnob(t.clientX, t.clientY);
    e.preventDefault();
  };
  const move = e=>{
    if(activeId === null) return;
    let t = null;
    if(e.changedTouches){
      for(const ct of e.changedTouches){
        if(ct.identifier === activeId){ t = ct; break; }
      }
      if(!t) return;
    } else {
      t = e;
    }
    updateKnob(t.clientX, t.clientY);
    e.preventDefault();
  };
  const end = e=>{
    if(e.changedTouches){
      let matched = false;
      for(const ct of e.changedTouches){
        if(ct.identifier === activeId){ matched = true; break; }
      }
      if(!matched) return;
    }
    activeId = null;
    knob.style.transform = 'translate(0,0)';
    touchInput.joystickX = 0;
    touchInput.downHeld = false;
  };
  stick.addEventListener('touchstart', start, {passive:false});
  stick.addEventListener('touchmove', move, {passive:false});
  stick.addEventListener('touchend', end);
  stick.addEventListener('touchcancel', end);
  stick.addEventListener('mousedown', start);
  window.addEventListener('mousemove', e=>{ if(activeId==='mouse') move(e); });
  window.addEventListener('mouseup', e=>{ if(activeId==='mouse') end(e); });
})();

document.querySelectorAll('.touch-btn').forEach(btn=>{

});

function touchAction(tb){
  if(game.startMenuOpen || game.jobSelectOpen) return; // 開場選單交給按鈕
  if(tb==='jump') tryJump();
  else if(tb==='attack') tryBasicAttack();
  else if(tb==='x') castActiveSkill(0);
  else if(tb==='c') castActiveSkill(1);
  else if(tb==='v') castActiveSkill(2);
  else if(tb==='action') interactOrPotion();

// === 選單按鈕 ===
(function(){
  const menuBtn = document.getElementById('touchMenuBtn');
  const panel = document.getElementById('touchMenuPanel');
  if(!menuBtn) return;
  const toggle = (e)=>{
    e && e.preventDefault();
    panel.classList.toggle('show');
  };
  menuBtn.addEventListener('touchstart', toggle, {passive:false});
  menuBtn.addEventListener('click', toggle);
  panel.querySelectorAll('button[data-tm]').forEach(b=>{
    const handler = (e)=>{
      e && e.preventDefault();
      const tm = b.dataset.tm;
      panel.classList.remove('show');
      if(tm==='skill') openSkillPanel();
      else if(tm==='relic') openRelicPanel();
      else if(tm==='inventory') openMobileInventory();
      else if(tm==='char') openMobileCharInfo();
      else if(tm==='fullscreen'){
        const el = document.documentElement;
        if(!document.fullscreenElement && el.requestFullscreen) el.requestFullscreen();
        else if(document.exitFullscreen) document.exitFullscreen();
      }
    };
    b.addEventListener('touchstart', handler, {passive:false});
    b.addEventListener('click', handler);
  });
  // 點外面關閉
  document.addEventListener('click', e=>{
    if(!panel.contains(e.target) && e.target !== menuBtn){
      panel.classList.remove('show');
    }
  });
})();

          <div class="mp-char-row"><span>擊殺數</span><span>${p.kills}</span></div>
          <div class="mp-char-row"><span>輪迴次數</span><span>${p.deaths}</span></div>
          <div class="mp-char-row"><span>神器</span><span>${p.relics.length} / 6</span></div>
        </div>
        <div class="mp-section-title">屬性</div>
        <div class="mp-char">
          ${Object.entries(STATS).map(([k,s])=>`<div class="mp-char-row"><span>${s.icon} ${s.name}</span><span>${p[k]}</span></div>`).join('')}
        </div>
        <div class="mp-section-title">戰鬥屬性</div>
        <div class="mp-char">
          <div class="mp-char-row"><span>物攻</span><span>${d.atk}</span></div>
          <div class="mp-char-row"><span>魔攻</span><span>${d.magic}</span></div>
          <div class="mp-char-row"><span>暴擊率</span><span>${(d.critChance*100).toFixed(1)}%</span></div>
          <div class="mp-char-row"><span>暴擊傷害</span><span>${(d.critDmg*100).toFixed(0)}%</span></div>
          <div class="mp-char-row"><span>閃避率</span><span>${(d.dodge*100).toFixed(1)}%</span></div>
          <div class="mp-char-row"><span>掉寶率</span><span>${(d.dropRate*100).toFixed(0)}%</span></div>
          <div class="mp-char-row"><span>護甲減傷</span><span>${(d.armorReduce*100).toFixed(1)}%</span></div>
        </div>
        ${p.statPoints>0 ? `
        <div class="mp-section-title">分配屬性點（剩餘 ${p.statPoints}）</div>
        <div class="mp-stat-buttons">
          ${Object.entries(STATS).map(([k,s])=>`<button class="mp-stat-btn" data-stat="${k}">${s.icon} ${s.name} +1</button>`).join('')}
        </div>` : ''}
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  game.startMenuOpen = true;
  overlay.querySelector('.mobile-panel-close').addEventListener('click',()=>{
    overlay.remove();
    game.startMenuOpen = false;
  });
  overlay.querySelectorAll('.mp-stat-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      if(p.statPoints<=0) return;
      p[b.dataset.stat]++;
      p.statPoints--;
      overlay.remove();
      game.startMenuOpen = false;
      openMobileCharInfo();
      updateUI();
    });
  });
}

function closeMobilePanels(){
  ['mobileInvOverlay','mobileCharOverlay'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.remove();
  });
}

// 阻止 canvas 上的觸控造成滾動
document.getElementById('gameCanvas').addEventListener('touchstart', e=>e.preventDefault(), {passive:false});
document.getElementById('gameCanvas').addEventListener('touchmove', e=>e.preventDefault(), {passive:false});

/* ============================================================
   MAIN LOOP
   ============================================================ */
let lastTime = performance.now();
function loop(t){
  const dt = Math.min(0.05, (t-lastTime)/1000);
  lastTime = t;
  const modalOpen = game.shopOpen || game.skillPanelOpen || game.relicPanelOpen
    || game.jobSelectOpen || game.treasureChoiceOpen || game.endingShown
    || game.startMenuOpen;
  // 同步給 CSS 用 (隱藏觸控 UI)
  document.body.classList.toggle('modal-open', modalOpen);
  if(!modalOpen){
    updatePlayer(dt);
    maintainMonsters(dt);
    updateMonsters(dt);
    updateProjectiles(dt);
    updatePet(dt);
    autoSave(dt);
  }
  updateEffects(dt);
  updateLoot(dt);
  render();
  updateCooldownUI();
  updateTouchSkillIcons();
  requestAnimationFrame(loop);
}

/* ============================================================
   SAVE / LOAD SYSTEM
   ============================================================ */
const SAVE_KEY = 'shadowforge_save_v1';

function saveGame(){
  try {
    const p = game.player;
    const data = {
      v: 1,
      ts: Date.now(),
      player: {
        lv:p.lv, xp:p.xp,
        hp:p.hp, mp:p.mp,
        str:p.str, dex:p.dex, int:p.int, vit:p.vit, lck:p.lck, def:p.def,
        statPoints:p.statPoints, gold:p.gold, kills:p.kills,
        weapon:p.weapon, job:p.job,
        worldX:p.worldX,
        potions:p.potions,
        learnedSkills:p.learnedSkills.slice(),
        activeSlots:p.activeSlots.slice(),
        passiveSlots:p.passiveSlots.slice(),
        relics:p.relics.slice(),
        deaths:p.deaths,
        bossesKilled:Object.assign({}, p.bossesKilled),
        bank:p.bank,
        petId:p.petId||null,
        ownedPets:(p.ownedPets||[]).slice(),
      },
      equipment: Object.assign({}, game.equipment),
      inventory: game.inventory.slice(),
      inventoryMax: game.inventoryMax,
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    return true;
  } catch(e){
    console.warn('Save failed', e);
    return false;
  }
}

function hasSave(){
  try { return !!localStorage.getItem(SAVE_KEY); } catch(e){ return false; }
}

function loadGame(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(!data || !data.player) return false;
    Object.assign(game.player, data.player);
    // 補回缺失的欄位（防舊存檔）
    if(!game.player.bossesKilled) game.player.bossesKilled = {};
    if(!game.player.relics) game.player.relics = [];
    if(!game.player.learnedSkills) game.player.learnedSkills = [];
    if(!game.player.activeSlots) game.player.activeSlots = [null,null,null];
    if(!game.player.passiveSlots) game.player.passiveSlots = [null,null,null];
    if(!game.player.ownedPets) game.player.ownedPets = [];
    game.equipment = Object.assign({weapon:null,helm:null,shoulder:null,chest:null,legs:null,gloves:null,ring:null,boots:null}, data.equipment||{});
    game.inventory = data.inventory || [];
    game.inventoryMax = data.inventoryMax || 30;
    // 重置動態欄位
    game.player.y = getGroundY();
    game.player.vx = 0; game.player.vy = 0;
    game.player.invincible = 1.5;
    game.player.buffs = {};
    game.monsters = []; game.loot = []; game.effects = [];
    game.treasureBoxes = []; game.projectiles = []; game.damageTexts = [];
    game.npcs = []; game.buildings = []; game.platforms = []; game.events = [];
    game.generatedVillages = new Set();
    game.generatedPlatforms = new Set();
    game.generatedBosses = new Set();
    game.generatedEvents = new Set();
    game.jobSelectOpen = false;
    game.cooldowns = [0,0,0,0];
    ensureVillagesGenerated();
    ensurePlatformsGenerated();
    if(game.player.petId) initPetPos();
    return true;
  } catch(e){
    console.warn('Load failed', e);
    return false;
  }
}

function deleteSave(){
  try { localStorage.removeItem(SAVE_KEY); } catch(e){}
}

// 自動存檔：每 15 秒 + 重要事件後
let autoSaveT = 0;
function autoSave(dt){
  autoSaveT += dt;
  if(autoSaveT >= 15){
    autoSaveT = 0;
    if(game.player.job) saveGame();
  }
}
window.addEventListener('beforeunload', ()=>{
  if(game.player.job) saveGame();
});

// 開場選單
function showStartMenu(){
  game.startMenuOpen = true;
  const overlay = document.createElement('div');
  overlay.id = 'startMenuOverlay';
  overlay.className = 'start-menu-overlay';
  const has = hasSave();
  let info = '';
  if(has){
    try {
      const data = JSON.parse(localStorage.getItem(SAVE_KEY));
      const p = data.player;
      const jobName = p.job && JOBS[p.job] ? JOBS[p.job].name : '?';
      info = `<div class="save-info">
        <div>職業：${jobName}</div>
        <div>等級：Lv. ${p.lv}</div>
        <div>神器：${(p.relics||[]).length} / 6</div>
        <div>輪迴：${p.deaths||0} 次</div>
        <div class="save-time">${new Date(data.ts).toLocaleString('zh-TW')}</div>
      </div>`;
    } catch(e){ info = '<div class="save-info">存檔損毀</div>'; }
  }
  overlay.innerHTML = `
    <div class="start-menu-modal">
      <div class="start-title">SHADOW<span>FORGE</span></div>
      <div class="start-sub">暗影獵寶</div>
      ${has ? `
        <button class="start-btn primary" id="btnContinue">繼續遊戲</button>
        ${info}
        <button class="start-btn" id="btnNewGame">新遊戲</button>
        <button class="start-btn danger" id="btnDelete">刪除存檔</button>
      ` : `
        <button class="start-btn primary" id="btnNewGame">開始新遊戲</button>
      `}
    </div>
  `;
  document.body.appendChild(overlay);
  const close = ()=>{ overlay.remove(); game.startMenuOpen = false; };
  if(has){
    document.getElementById('btnContinue').onclick = ()=>{
      if(loadGame()){
        close();
        updateUI();
        logMsg('讀檔成功','good');
      } else {
        alert('讀檔失敗');
      }
    };
    document.getElementById('btnDelete').onclick = ()=>{
      if(confirm('確定刪除存檔？此操作無法復原')){
        deleteSave();
        close();
        showStartMenu();
      }
    };
  }
  document.getElementById('btnNewGame').onclick = ()=>{
    if(has && !confirm('確定要開始新遊戲？舊存檔將被覆蓋')) return;
    close();
    showJobSelect();
  };
}

/* ============================================================
   INIT
   ============================================================ */
resizeCanvas();
game.player.worldX = 300;
game.player.y = getGroundY();

updateUI();
logMsg('歡迎來到暗影獵寶');
showStartMenu();
requestAnimationFrame(loop);
</script>
